<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arithmetic Pro">

<meta name="theme-color" content="#0b0f17">

<link rel="manifest" href="manifest.json">

<title>Arithmetic Pro</title>

<style>
html, body { margin:0; height:100%; }

body::before {
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background: linear-gradient(135deg,#0b0f17,#111827);
}

body {
  font-family:-apple-system;
  display:flex;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  min-height:100dvh;
  overscroll-behavior:none;
  color:#f5f5f5;
}

#main { width:90%; padding:16px; }

#historyPanel {
  width:10%;
  height:100dvh;
  overflow-y:auto;
  padding:6px;
  background: rgba(20,20,20,0.35);
  backdrop-filter: blur(10px);
  border-left:1px solid rgba(255,255,255,0.08);
}

.card {
  background: rgba(30,30,30,0.55);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
}

button {
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  background:#007aff;
  color:white;
  font-size:18px;
  margin-bottom:25px;
}

#question { font-size:44px; text-align:center; margin:25px 0; }
#answer {
  display:block;
  margin:auto;
  width:100%;
  max-width:260px;
  font-size:42px;
  text-align:center;
  border:2px solid #fff;
  border-radius:10px;
  background:transparent;
  color:#fff;
}
</style>
</head>

<body>

<div id="main">
<h2>Arithmetic Pro</h2>

<button id="startBtn">Start</button>

<div id="game" style="display:none;">
<div id="question"></div>
<input id="answer" type="tel">
</div>
</div>

<div id="historyPanel"></div>

<script>
let ans=0;

function generate(){
  let a=Math.floor(Math.random()*10);
  let b=Math.floor(Math.random()*10);
  ans=a+b;
  question.innerText=`${a}+${b}`;
}

startBtn.onclick=function(){
  game.style.display="block";
  generate();
};

answer.oninput=e=>{
  if(+e.target.value===ans){
    e.target.value="";
    generate();
  }
};
</script>

<!-- ✅ Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
