<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arithmetic Pro">

<meta name="theme-color" content="#eef1f5" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0b0f17" media="(prefers-color-scheme: dark)">

<link rel="manifest" href="manifest.json">

<title>Arithmetic Pro</title>

<style>
html, body { margin:0; height:100%; }

body::before {
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background: linear-gradient(135deg,#eef1f5,#dfe6ee);
}

@media (prefers-color-scheme: dark) {
  body::before {
    background: linear-gradient(135deg,#0b0f17,#111827);
  }
}

body {
  font-family:-apple-system;
  display:flex;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  min-height:100dvh;
  overscroll-behavior:none;
}

#main { width:90%; padding:16px; }

#historyPanel {
  width:10%;
  height:100dvh;
  overflow-y:auto;
  padding:6px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(10px);
  border-left:1px solid rgba(0,0,0,0.08);
}

.card {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(14px);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
}

button {
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  background:#007aff;
  color:white;
  font-size:18px;
  margin-bottom:25px;
}

#question {
  font-size:44px;
  text-align:center;
  margin:25px 0;
  min-height:60px;
}

#answer {
  display:block;
  margin:auto;
  width:100%;
  max-width:260px;
  font-size:42px;
  text-align:center;
  border:2px solid #000;
  border-radius:10px;
  background:transparent;
}

.stats { text-align:center; }

#overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding-bottom:60px;
}

#box {
  background:white;
  padding:22px;
  border-radius:18px;
  width:340px;
}

@media (prefers-color-scheme: dark) {
  body { color:#f5f5f5; }
  #historyPanel { background: rgba(20,20,20,0.35); border-left:1px solid rgba(255,255,255,0.08); }
  .card { background: rgba(30,30,30,0.55); color:#fff; }
  #answer { border:2px solid #fff; color:#fff; }
  #box { background:#1c1c1e; color:#fff; }
}
</style>
</head>

<body>

<div id="main">

<h2>Arithmetic Pro</h2>

<button id="startBtn">Start</button>

<div id="game" style="display:none;">
<div class="stats"><span id="timer"></span></div>
<div id="question"></div>
<input id="answer" type="tel" inputmode="numeric">
</div>

</div>

<div id="historyPanel"></div>

<div id="overlay">
<div id="box">
<h2>Game Over</h2>
<div id="final"></div>
<button onclick="reset()">Play Again</button>
</div>
</div>

<script>
const startBtn=document.getElementById("startBtn");
const questionEl=document.getElementById("question");
const answerEl=document.getElementById("answer");
const timerEl=document.getElementById("timer");
const gameEl=document.getElementById("game");
const overlay=document.getElementById("overlay");
const finalEl=document.getElementById("final");

let ans=0;
let questionStart=0;
let correct=0;
let totalQuestions=0;

let speedStats = { fast:0, quick:0, normal:0, slow:0 };
let history=JSON.parse(localStorage.getItem("h")||"[]");

function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function getScore(time){
  if(time < 3) return 8;
  if(time < 5) return 4;
  if(time <= 7) return 2;
  return 1;
}

function generate(){
  totalQuestions++;
  let a=rand(1,20);
  let b=rand(1,20);
  ans=a+b;
  questionEl.innerText=`${a}+${b}`;
  questionStart=performance.now();
}

let endTime=0;

function loop(){
  let t=Math.max(0,Math.floor((endTime-Date.now())/1000));
  timerEl.innerText="⏱ "+t;
  if(t<=0){finish();return;}
  requestAnimationFrame(loop);
}

startBtn.onclick=function(){
  correct=0;
  totalQuestions=0;
  speedStats={fast:0,quick:0,normal:0,slow:0};

  endTime=Date.now()+60000;

  gameEl.style.display="block";
  generate();
  loop();
};

answerEl.addEventListener("input", e => {
  if(e.target.value==="") return;

  let v=+e.target.value;

  if(v===ans){
    const time = (performance.now() - questionStart) / 1000;

    correct += getScore(time);

    if(time < 3) speedStats.fast++;
    else if(time < 5) speedStats.quick++;
    else if(time <= 7) speedStats.normal++;
    else speedStats.slow++;

    e.target.value="";
    generate();
  }
});

function finish(){
  gameEl.style.display="none";
  overlay.style.display="flex";

  finalEl.innerHTML=`
  <div><b>Score:</b> ${correct}</div>
  <div><b>Questions:</b> ${totalQuestions}</div>
  <hr>
  <div>Fast: ${speedStats.fast}</div>
  <div>Quick: ${speedStats.quick}</div>
  <div>Normal: ${speedStats.normal}</div>
  <div>Slow: ${speedStats.slow}</div>
  `;

  history.push({score:correct});
  localStorage.setItem("h",JSON.stringify(history));
}

function reset(){ overlay.style.display="none"; }

</script>

<!-- PWA -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
